spring.application.name=secure-messaging-system
server.port=${PORT:8080}
# =========================
# PostgreSQL Configuration
# =========================

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/secure_messaging_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# =========================
# JPA / Hibernate
# =========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:securemessagingjwtsecretkeymustbeatleast32chars}