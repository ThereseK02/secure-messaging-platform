services:
  - type: web
    name: secure-messaging-system
    env: docker
    plan: free
    autoDeploy: true

    envVars:
      - key: JWT_SECRET
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: secure-messaging-db
          property: connectionString

      - key: DB_USERNAME
        fromDatabase:
          name: secure-messaging-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: secure-messaging-db
          property: password
